name: Release

on:
  push:
    tags:

      - 'v*'

jobs:
  build:
    permissions:
      contents: write

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4

        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
      - run: npm run dist

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}