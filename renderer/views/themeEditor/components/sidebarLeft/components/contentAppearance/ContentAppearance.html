<div id="{{id:theme-editor_sidebar-left}}" class="theme-editor_sidebarLeft-element">

    <header>Base</header>
    <div class="item" data-key="background" data-type="color">
        <span>Background Base</span><input type="color" />
    </div>
    <div class="item" data-key="background-surface" data-type="color">
        <span>Background Surface</span><input type="color" />
    </div>
    <div class="item" data-key="background-elevated" data-type="color">
        <span>Background Elevated</span><input type="color" />
    </div>
    <div class="item" data-key="border" data-type="color">
        <span>Border</span><input type="color" />
    </div>
    <div class="item" data-key="scrollbar-size" data-type="number">
        <span>Scrollbar width</span>
        <input type="number" value="6" min="0" max="16" />
    </div>

    <header>Text</header>
    <div class="item" data-key="text-primary" data-type="color">
        <span>Primary</span><input type="color" />
    </div>
    <div class="item" data-key="text-secondary" data-type="color">
        <span>Secondary</span><input type="color" />
    </div>
    <div class="item" data-key="text-muted" data-type="color">
        <span>Muted</span><input type="color" />
    </div>

    <header>Heading</header>
    <div class="item" data-key="heading" data-type="color">
        <span>Heading color</span><input type="color" />
    </div>

    <header>Accent</header>
    <div class="item" data-key="accent" data-type="color">
        <span>Accent</span><input type="color" />
    </div>
    <div class="item" data-key="accent-hover" data-type="color">
        <span>Accent hover</span><input type="color" />
    </div>

    <header>Link</header>
    <div class="item" data-key="link" data-type="color">
        <span>Link</span><input type="color" />
    </div>
    <div class="item" data-key="link-underline" data-type="color">
        <span>Link underline</span><input type="color" />
    </div>

    <header>Code</header>
    <div class="item" data-key="code-background" data-type="color">
        <span>Background</span><input type="color" />
    </div>
    <div class="item" data-key="code-border" data-type="color">
        <span>Border</span><input type="color" />
    </div>
    <div class="item" data-key="code-text" data-type="color">
        <span>Text</span><input type="color" />
    </div>
    <div class="item">
        <span>Override tag text color</span>
        <button class="checkbox-element"
            data-checkbox="true"
            data-checkbox-target="[data-key='code-tag-text']">
        </button>
    </div>
    <div class="item item--sub" data-key="code-tag-text" data-type="color" data-show-on-check="true">
        <div class="item--sub-line"></div>
        <span>Tag text</span><input type="color" />
    </div>
    <div class="item" data-key="code-radius" data-type="number">
        <span>Border radius</span>
        <input type="number" value="4" min="0" max="20" />
    </div>

    <!--
    multi sub elements
    <div class="item item--sub-container">
        <div class="item item--sub" data-key="code-text-color" data-type="color" data-show-on-check="true">
            <div class="item--sub-line"></div>
            <span>text-color</span>
            <input type="color" />
        </div>
        <div class="item item--sub" data-key="code-text-color" data-type="color" data-show-on-check="true">
            <div class="item--sub-line"></div>
            <span>text-color</span>
            <input type="color" />
        </div>
    </div>
    -->

</div>
