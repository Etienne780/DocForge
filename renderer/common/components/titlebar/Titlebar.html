<header id="{{id:header}}" class="topbar" data-win-bar>

  <div class="topbar-left__actions">

    <div id="{{id:brand-button}}" class="topbar__brand" role="button" tabindex="0" title="Manage projects">
      <svg id="{{id:logo}}" width="16" height="16"></svg>
      DocForge
    </div>

    <div class="horizontal-separator"></div>

    <div class="topbar_tab-element_container">
      <button id="{{id:tab-element_projects}}" class="tab-element" data-tab-action="projects">Projects</button>
      <button id="{{id:tab-element_themes}}" class="tab-element" data-tab-action="themes">Themes</button>
    </div>

    <div class="horizontal-separator"></div>

    <button class="menu-item">
      File
      <div id="{{id:file-dropdown}}" class="dropdown"></div>
    </button>
    
    <button class="menu-item">
      Help
      <div id="{{id:help-dropdown}}" class="dropdown"></div>
    </button>

  </div>
  
  <div class="topbar-right__actions">

    <span id="{{id:autosave-indicator}}" class="autosave-indicator" aria-live="polite">●</span>

    <button id="{{id:dark-mode-button}}" class="icon-button" title="Toggle dark / light mode" aria-label="Toggle dark mode">
      <svg id="{{id:mode-icon}}" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"></svg>
    </button>

    <!--<svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path d="M5 3h11l5 5v13H5V3Zm3 0v6h8V3H8Zm4 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" fill="currentColor"/>
      </svg>-->

  </div>

  <div class="window-controls"></div>
</header>
