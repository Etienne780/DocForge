<header id="{{id:header}}" class="topbar">

  <div class="topbar__brand" id="{{id:brand-button}}" role="button" tabindex="0" title="Manage projects">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <rect x="1" y="1" width="6" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <rect x="9" y="6" width="6" height="9" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <line x1="3" y1="4" x2="5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      <line x1="3" y1="6.5" x2="5" y2="6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    DocForge
  </div>
  
  <div class="topbar__actions">

    <span id="{{id:autosave-indicator}}" class="autosave-indicator" aria-live="polite">●</span>

    <button id="{{id:dark-mode-button}}" class="icon-button" title="Toggle dark / light mode" aria-label="Toggle dark mode">
      <svg id="{{id:mode-icon}}" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"></svg>
    </button>

    <button id="{{id:save-button}}" class="icon-button" title="Save (Ctrl+S)" aria-label="Save">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path d="M5 3h11l5 5v13H5V3Zm3 0v6h8V3H8Zm4 14a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" fill="currentColor"/>
      </svg>
    </button>

    <button id="{{id:export-button}}" class="icon-button" title="Export as HTML" aria-label="Export as HTML">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
        <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </button>

  </div>
</header>
